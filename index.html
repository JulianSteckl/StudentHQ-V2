<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scholar — Academic Dashboard</title>
<meta name="application-name" content="Scholar">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  #root { height: 100vh; overflow: hidden; }
  button { cursor: pointer; font-family: inherit; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e0d8cc; border-radius: 2px; }
  @keyframes screen-in {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .screen-enter { animation: screen-in 0.2s ease forwards; }
  @keyframes shq-modal-fade-in { from { opacity:0 } to { opacity:1 } }
  @keyframes shq-modal-fade-out { from { opacity:1 } to { opacity:0 } }
  @keyframes shq-modal-slide-up {
    0%   { opacity:0; transform:translateY(16px) scale(0.96); }
    100% { opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes shq-modal-slide-down {
    0%   { opacity:1; transform:translateY(0) scale(1); }
    100% { opacity:0; transform:translateY(10px) scale(0.97); }
  }
  /* Screen padding */
  .shq-screen-pad { padding:28px 52px; box-sizing:border-box; }
  /* Homework 5-stat row */
  .shq-hw-stats { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
  /* Schedule stats + 5-day grid */
  .shq-sched-stats { display:grid; grid-template-columns:repeat(4,1fr) minmax(140px,1fr); gap:12px; }
  .shq-sched-week { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
  /* Tools layout */
  .shq-tools-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .shq-tools-mid { display:grid; grid-template-columns:1fr 0.58fr 0.42fr; gap:12px; }
  .shq-tools-bottom { display:flex; gap:12px; align-items:flex-start; }
  .shq-tools-side { width:216px; display:flex; flex-direction:column; justify-content:space-between; flex-shrink:0; align-self:stretch; gap:12px; }
  .shq-tools-filters { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
  /* Notes + Flashcards */
  .shq-notes-panels { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .shq-fc-modes { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .shq-fc-rating { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  /* Responsive */
  @media (max-width: 767px) {
    .shq-sidebar { position:fixed!important; z-index:800!important; left:0; top:0; bottom:0; transform:translateX(-100%); transition:transform 0.28s cubic-bezier(0.4,0,0.2,1); }
    .shq-sidebar.open { transform:translateX(0); }
    .shq-sidebar-overlay { position:fixed; inset:0; z-index:799; background:rgba(24,21,14,0.3); opacity:0; transition:opacity 0.28s; pointer-events:none; }
    .shq-sidebar-overlay.open { opacity:1; pointer-events:auto; }
    .shq-mobile-header { display:flex!important; }
    .shq-screen-pad { padding:16px!important; }
    .shq-setup-cols { flex-direction:column!important; }
    .shq-setup-right { display:none!important; }
    .shq-setup-left { padding:24px 20px 20px!important; }
    .shq-setup-footer { padding:12px 16px!important; }
    .shq-setup-footer .shq-footer-motto, .shq-setup-footer .shq-footer-printed { display:none!important; }
    .shq-modal-box { width:calc(100vw - 32px)!important; max-width:100%!important; max-height:calc(100vh - 80px)!important; margin:16px!important; }
    .shq-stats-row { grid-template-columns:1fr 1fr!important; margin-left:16px!important; margin-right:16px!important; }
    .shq-grades-table { overflow-x:auto!important; }
    .shq-grades-table > div { min-width:600px!important; }
    .shq-week-grid { grid-template-columns:repeat(7,1fr)!important; gap:4px!important; margin-left:16px!important; margin-right:16px!important; }
    .shq-feature-grid { grid-template-columns:1fr!important; }
    .shq-setup-progress { padding:0 16px!important; }
    .shq-setup-progress .shq-step-label { display:none!important; }
    .shq-grades-stats { grid-template-columns:1fr 1fr!important; }
    .shq-hw-stats { grid-template-columns:repeat(2,1fr)!important; }
    .shq-sched-stats { grid-template-columns:repeat(2,1fr)!important; }
    .shq-sched-week { grid-template-columns:1fr!important; }
    .shq-tools-stats { grid-template-columns:repeat(2,1fr)!important; }
    .shq-tools-mid { grid-template-columns:1fr!important; }
    .shq-tools-bottom { flex-direction:column!important; }
    .shq-tools-side { width:100%!important; }
    .shq-notes-panels { grid-template-columns:1fr!important; }
    .shq-fc-modes { grid-template-columns:1fr!important; }
  }
  @media (min-width: 768px) {
    .shq-mobile-header { display:none!important; }
    .shq-sidebar-overlay { display:none!important; }
  }
  @media (min-width: 768px) and (max-width: 1023px) {
    .shq-hw-stats { grid-template-columns:repeat(3,1fr)!important; }
    .shq-sched-week { grid-template-columns:repeat(2,1fr)!important; }
    .shq-tools-mid { grid-template-columns:1fr 1fr!important; }
    .shq-fc-modes { grid-template-columns:repeat(2,1fr)!important; }
  }
  @media (min-width: 768px) and (max-width: 1199px) {
    .shq-screen-pad { padding:28px 32px!important; }
    .shq-setup-right { width:320px!important; padding:24px 20px!important; }
    .shq-modal-box { width:calc(100vw - 64px)!important; max-width:520px!important; }
  }
  @keyframes shq-toast-in {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .shq-toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    z-index:2000; max-width:min(420px, calc(100vw - 32px));
    padding:12px 18px; border-radius:10px;
    background:#18150e; color:#f8f6f0;
    font-family:"DM Sans",sans-serif; font-size:13px; line-height:1.45;
    box-shadow:0 12px 40px rgba(24,21,14,0.22);
    animation:shq-toast-in 0.22s ease forwards;
    pointer-events:none;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>

<!DOCTYPE html>

<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }

  button { cursor: pointer; font-family: inherit; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e0d8cc; border-radius: 2px; }
  @keyframes screen-in {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .screen-enter { animation: screen-in 0.2s ease forwards; }
</style>
</head>

const GPA_MAP = { 'A+':4.0,'A':4.0,'A−':3.7,'B+':3.3,'B':3.0,'B−':2.7,'C+':2.3,'C':2.0,'C−':1.7,'D':1.0,'F':0 };

  { id:'notebooklm', name:'NotebookLM', cat:'AI',           color:'#4285f4', desc:'Upload your notes and lecture slides — ask AI anything about them.',     sessions:0, lastUsed:'Never',  trend:0,    connected:false },
  { id:'zapier',     name:'Zapier',     cat:'PRODUCTIVITY', color:'#ff4a00', desc:'Automate repetitive tasks by connecting your apps and workflows.',       sessions:0, lastUsed:'Never',  trend:0,    connected:false },
  { id:'canva',      name:'Canva',      cat:'DESIGN',       color:'#00b4bc', desc:'Create posters, presentations, and graphics with drag-and-drop.',       sessions:0, lastUsed:'Never',  trend:0,    connected:false },
  { id:'gemini',     name:'Gemini',     cat:'AI',           color:'#4285f4', desc:'Google\'s multimodal AI for research, writing, and complex tasks.',     sessions:0, lastUsed:'Never',  trend:0,    connected:false },
];
const GPA = (SUBJECTS.reduce((a,s) => a + s.gpa, 0) / SUBJECTS.length).toFixed(2);
const subjectBy = (id) => SUBJECTS.find(s => s.id === id) || SUBJECTS[0];

function greeting() {
  const h = new Date().getHours();
  if (h < 5)  return 'Up late.';
  if (h < 12) return 'Good morning.';
  if (h < 17) return 'Good afternoon.';
  return 'Good evening.';
}
function formatDate() {
  return new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}

/* ── Icons ──────────────────────────────────────────────── */
const ICO = {
  today:      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="8" r="5.5"/><path d="M8 5.5V8l2 1.2"/></svg>,
  homework:   <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="2" width="10" height="12" rx="1"/><path d="M5 6.5l1.5 1.5L9 5M5 10.5l1.5 1.5L9 9"/></svg>,
  quizzes:    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"><circle cx="8" cy="8" r="5.5"/><path d="M6.5 6.3a1.6 1.6 0 1 1 2 1.4V9M8 11v.1"/></svg>,
  notes:      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><path d="M4 2h5.5l3.5 3.5V14H4V2zm5.5 0v3.5H13M5.5 8h5M5.5 11h3"/></svg>,
  flashcards: <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="5" width="10" height="8" rx="1"/><path d="M5 3h8.5v7.5"/></svg>,
  schedule:   <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="3" width="12" height="11" rx="1"/><path d="M2 7h12M5.5 1.5v3M10.5 1.5v3"/></svg>,
  grades:     <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><path d="M8 2l1.6 3.8 4 .5-2.9 2.8.7 4-3.4-1.9-3.4 1.9.7-4L2.4 6.3l4-.5z"/></svg>,
  tools:      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="4.5" height="4.5" rx="0.8"/><rect x="9.5" y="2" width="4.5" height="4.5" rx="0.8"/><rect x="2" y="9.5" width="4.5" height="4.5" rx="0.8"/><rect x="9.5" y="9.5" width="4.5" height="4.5" rx="0.8"/></svg>,
  subjects:   <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><path d="M2 2h5v5H2zM9 2h5v5H9zM2 9h5v5H2zM9 9h5v5H9z"/></svg>,
};

/* ── Navigation config ──────────────────────────────────── */
const NAV = [
  { id:'today',      label:'Today',      icon: ICO.today      },
  { id:'homework',   label:'Homework',   icon: ICO.homework   },
  { id:'quizzes',    label:'Quizzes',    icon: ICO.quizzes    },
  { id:'notes',      label:'Notes',      icon: ICO.notes      },
  { id:'flashcards', label:'Flashcards', icon: ICO.flashcards },
  { id:'schedule',   label:'Schedule',   icon: ICO.schedule   },
  { id:'grades',     label:'Grades',     icon: ICO.grades     },
  { id:'tools',      label:'Tools',      icon: ICO.tools      },
];

/* ── Sidebar ────────────────────────────────────────────── */
function Sidebar({ screen, onNav }) {
  return (
    <aside style={{
      width:200, flexShrink:0,
      background:T.surface,
      borderRight:`1px solid ${T.border}`,
      display:'flex', flexDirection:'column', overflow:'hidden',
    }}>
      {/* Brand */}
      <div style={{padding:'26px 22px 22px', borderBottom:`1px solid ${T.border}`, flexShrink:0}}>
        <div style={{width:36, height:36, border:`1px solid ${T.accent}`, display:'flex', alignItems:'center', justifyContent:'center', marginBottom:11}}>
          <span style={{fontFamily:T.serif, fontStyle:'italic', fontSize:21, color:T.accent, lineHeight:1}}>J</span>
        </div>
        <div style={{fontFamily:T.mono, fontSize:8, color:T.ink3, letterSpacing:'0.17em', textTransform:'uppercase'}}>Scholar</div>
      </div>

      {/* Nav */}
      <div style={{padding:'10px 0', borderBottom:`1px solid ${T.border}`, flexShrink:0}}>
        {NAV.map(item => {
          const act = screen === item.id;
          return (
            <button
              key={item.id}
              onClick={() => onNav(item.id)}
              style={{
                display:'flex', alignItems:'center', gap:9,
                width:'100%', padding:'7px 22px',
                border:'none', borderLeft:`2px solid ${act ? T.accent : 'transparent'}`,
                background: act ? T.accentSoft : 'transparent',
                color: act ? T.ink : T.ink3,
                fontSize:13, fontFamily:T.ui, textAlign:'left',
                fontWeight: act ? 500 : 400,
                transition:'background 0.12s, color 0.12s',
              }}
              onMouseOver={e => { if (!act) e.currentTarget.style.background = T.bl; }}
              onMouseOut={e => { if (!act) e.currentTarget.style.background = 'transparent'; }}
            >
              <span style={{flexShrink:0, opacity: act ? 1 : 0.55, display:'flex'}}>{item.icon}</span>
              {item.label}
            </button>
          );
        })}
      </div>

      {/* Subjects quick list */}
      <div style={{flex:1, overflow:'auto', padding:'16px 0'}}>
        <div style={{fontFamily:T.mono, fontSize:7.5, color:T.ink3, textTransform:'uppercase', letterSpacing:'0.16em', padding:'0 22px', marginBottom:8}}>Subjects</div>
        {SUBJECTS.map(s => (
          <div
            key={s.id}
            onClick={() => onNav('subjects')}
            style={{display:'flex', alignItems:'center', gap:9, padding:'5px 22px', fontSize:12.5, color:T.ink2, cursor:'pointer'}}
            onMouseOver={e => e.currentTarget.style.background = T.bl}
            onMouseOut={e => e.currentTarget.style.background = 'transparent'}
          >
            <div style={{width:6, height:6, borderRadius:1.5, background:s.color, flexShrink:0}} />
            <span style={{flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{s.short}</span>
            <span style={{fontFamily:T.mono, fontSize:8, color:s.color, fontWeight:600, flexShrink:0}}>{s.grade}</span>
          </div>
        ))}
      </div>

      {/* User */}
      <div style={{padding:'13px 22px', borderTop:`1px solid ${T.border}`, flexShrink:0}}>
        <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:14, color:T.ink, marginBottom:3, lineHeight:1.2}}>Julian R.</div>
        <div style={{fontFamily:T.mono, fontSize:8, color:T.ink3, letterSpacing:'0.07em'}}>Junior · streak 12</div>
      </div>
    </aside>
  );
}

/* ── Shared ─────────────────────────────────────────────── */
function PageHeader({ eyebrow, title, right }) {
  return (
    <div style={{display:'flex', alignItems:'flex-end', justifyContent:'space-between', marginBottom:40, flexWrap:'wrap', gap:16}}>
      <div>
        {eyebrow && <div style={{fontFamily:T.mono, fontSize:8.5, color:T.ink3, letterSpacing:'0.15em', textTransform:'uppercase', marginBottom:12}}>{eyebrow}</div>}
        <h1 style={{fontFamily:T.serif, fontStyle:'italic', fontSize:'clamp(36px,4.5vw,56px)', fontWeight:400, color:T.ink, margin:0, letterSpacing:'-0.025em', lineHeight:1.04}}>{title}</h1>
      </div>
      {right && <div style={{textAlign:'right'}}>{right}</div>}
    </div>
  );
}
function Hr({ mb=32 }) { return <div style={{height:1, background:T.border, marginBottom:mb}} />; }

/* ── 1. Today ───────────────────────────────────────────── */
function TodayScreen() {
  const open = HOMEWORK.filter(h => !h.done);
  return (
    <div className="screen-enter" style={{flex:1, overflowY:'auto', padding:'56px 72px'}}>
      <PageHeader
        eyebrow={formatDate()}
        title={greeting()}
        right={
          <>
            <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:'clamp(52px,6.5vw,82px)', color:T.accent, lineHeight:0.86, letterSpacing:'-0.04em'}}>{GPA}</div>
            <div style={{fontFamily:T.mono, fontSize:8.5, color:T.ink3, letterSpacing:'0.14em', textTransform:'uppercase', marginTop:9}}>Grade point average</div>
          </>
        }
      />
      <Hr />
      {open.map(h => {
        const s = subjectBy(h.subj);
        return (
          <div key={h.title} style={{display:'flex', alignItems:'baseline', gap:16, padding:'13px 0', borderBottom:`1px solid ${T.bl}`}}>
            <div style={{flex:1, fontFamily:T.serif, fontSize:18, color:T.ink, lineHeight:1.3}}>{h.title}</div>
            <div style={{fontFamily:T.mono, fontSize:9, color:T.ink3, letterSpacing:'0.07em', textTransform:'uppercase', flexShrink:0}}>{s.name}</div>
            <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:14, color:h.urgent ? T.accent : T.ink3, minWidth:70, textAlign:'right', flexShrink:0}}>{h.due}</div>
          </div>
        );
      })}
      <Hr mb={0} />
      <div style={{height:28}} />
      <div style={{display:'flex', flexWrap:'wrap'}}>
        {SUBJECTS.map((s,i) => (
          <div key={s.id} style={{flex:1, minWidth:56, textAlign:'center', borderRight: i < SUBJECTS.length-1 ? `1px solid ${T.border}` : 'none', padding:'2px 4px'}}>
            <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:30, color:T.accent, lineHeight:1, letterSpacing:'-0.02em'}}>{s.grade}</div>
            <div style={{fontFamily:T.mono, fontSize:7.5, color:T.ink3, letterSpacing:'0.12em', textTransform:'uppercase', marginTop:6}}>{s.short}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── 2. Homework ────────────────────────────────────────── */
function HomeworkScreen() {
  const open = HOMEWORK.filter(h => !h.done);
  const done = HOMEWORK.filter(h => h.done);
  const COL = '1fr 150px 80px 88px';
  const ColHdr = () => (
    <div style={{display:'grid', gridTemplateColumns:COL, gap:16, padding:'9px 0', borderBottom:`1px solid ${T.border}`}}>
      {['Assignment','Subject','Due','Est.'].map((c,i) => (
        <div key={c} style={{fontFamily:T.mono, fontSize:7.5, color:T.ink3, textTransform:'uppercase', letterSpacing:'0.13em', textAlign:i>0?'right':'left'}}>{c}</div>
      ))}
    </div>
  );
  return (
    <div className="screen-enter" style={{flex:1, overflowY:'auto', padding:'56px 72px'}}>
      <PageHeader eyebrow={`${open.length} open · ${done.length} complete`} title="Assignments" />
      <ColHdr />
      {open.map(h => {
        const s = subjectBy(h.subj);
        return (
          <div key={h.title} style={{display:'grid', gridTemplateColumns:COL, gap:16, padding:'13px 0', borderBottom:`1px solid ${T.bl}`, alignItems:'baseline'}}>
            <div style={{fontFamily:T.serif, fontSize:17, color:T.ink, lineHeight:1.3}}>{h.title}</div>
            <div style={{fontFamily:T.mono, fontSize:9.5, color:T.ink3, textAlign:'right'}}>{s.name}</div>
            <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:14, color:h.urgent ? T.accent : T.ink3, textAlign:'right'}}>{h.due}</div>
            <div style={{fontFamily:T.mono, fontSize:9.5, color:T.ink3, textAlign:'right'}}>{h.est}</div>
          </div>
        );
      })}
      {done.length > 0 && (
        <div style={{marginTop:36, opacity:0.4}}>
          <ColHdr />
          {done.map(h => {
            const s = subjectBy(h.subj);
            return (
              <div key={h.title} style={{display:'grid', gridTemplateColumns:COL, gap:16, padding:'12px 0', borderBottom:`1px solid ${T.bl}`, alignItems:'baseline'}}>
                <div style={{fontFamily:T.serif, fontSize:17, color:T.ink2, textDecoration:'line-through', lineHeight:1.3}}>{h.title}</div>
                <div style={{fontFamily:T.mono, fontSize:9.5, color:T.ink3, textAlign:'right'}}>{s.name}</div>
                <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:14, color:T.ink3, textAlign:'right'}}>Done</div>
                <div style={{fontFamily:T.mono, fontSize:9.5, color:T.ink3, textAlign:'right'}}>{h.est}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ── 3. Quizzes ─────────────────────────────────────────── */

  const cl = (c) => c >= 0.75 ? 'strong' : c >= 0.55 ? 'fair' : 'weak';
  return (
    <div className="screen-enter" style={{flex:1, overflowY:'auto', padding:'56px 72px'}}>
      <PageHeader eyebrow={`${QUIZZES_DATA.length} upcoming`} title="Quizzes" />

/* ── 5. Flashcards ──────────────────────────────────────── */
function FlashcardsScreen() {
  const [qi, setQi] = useState(0);
  const [fl, setFl] = useState(false);
  const [activeD, setActiveD] = useState(1);
  const dueTotal = DECKS.reduce((a,d) => a + d.due, 0);
  const card = QUIZ[qi % QUIZ.length];
  const next = (e) => { e.stopPropagation(); setFl(false); setQi((qi+1) % QUIZ.length); };

  return (
    <div className="screen-enter" style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden', padding:'56px 72px 0'}}>
      <PageHeader eyebrow={`${dueTotal} cards due today`} title="Flashcards" />
      <Hr mb={20} />

      <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:1, marginBottom:16, background:T.border, flexShrink:0}}>
        {DECKS.map((d,i) => {
          const s = subjectBy(d.subj);
          const act = i === activeD;
          return (
            <div
              key={d.name}
              onClick={() => setActiveD(i)}
              style={{background: act ? T.accentSoft : T.surface, padding:'13px 16px', cursor:'pointer', transition:'background 0.12s'}}
              onMouseOver={e => { if (!act) e.currentTarget.style.background = T.bl; }}
              onMouseOut={e => { if (!act) e.currentTarget.style.background = T.surface; }}
            >
              <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:15, color: act ? T.accent : T.ink, marginBottom:8, lineHeight:1.3}}>{d.name}</div>
              <div style={{height:1.5, background:T.border, marginBottom:6, position:'relative'}}>
                <div style={{position:'absolute', top:0, left:0, width:`${d.m/d.n*100}%`, height:'100%', background: act ? T.accent : s.color}} />
              </div>
              <div style={{display:'flex', justifyContent:'space-between'}}>
                <span style={{fontFamily:T.mono, fontSize:8, color:T.ink3}}>{s.short}</span>
                <span style={{fontFamily:T.mono, fontSize:8, color: act ? T.accent : T.ink3}}>{d.m}/{d.n}</span>
              </div>
            </div>
          );
        })}
      </div>

      <div
        onClick={() => setFl(!fl)}
        style={{
          flex:1, border:`1px solid ${fl ? T.accent : T.border}`,
          padding:'40px 60px', cursor:'pointer',
          background: fl ? T.accentSoft : T.surface,
          display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', textAlign:'center',
          transition:'border-color 0.18s, background 0.18s',
        }}
      >
        <div style={{fontFamily:T.mono, fontSize:8.5, color: fl ? T.accent : T.ink3, textTransform:'uppercase', letterSpacing:'0.14em', marginBottom:20}}>
          {fl ? 'Answer' : `Question ${qi+1} of ${QUIZ.length}`}
        </div>
        <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize: fl ? 20 : 24, color:T.ink, lineHeight:1.65, maxWidth:500}}>
          {fl ? card.a : card.q}
        </div>
        {!fl && <div style={{fontFamily:T.mono, fontSize:8.5, color:`${T.ink3}88`, marginTop:22, letterSpacing:'0.1em'}}>click to reveal</div>}
      </div>

      {fl && (
        <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:1, marginTop:1, background:T.border, flexShrink:0}}>
          {[['Again','#bf3a1a'],['Good',T.ink3],['Easy',T.accent]].map(([label,color]) => (
            <button key={label} onClick={next}
              style={{padding:'13px', border:'none', background:T.surface, color, fontFamily:T.serif, fontStyle:'italic', fontSize:15, transition:'background 0.12s'}}
              onMouseOver={e => e.currentTarget.style.background = T.bl}
              onMouseOut={e => e.currentTarget.style.background = T.surface}
            >{label}</button>
          ))}
        </div>
      )}
      <div style={{height:24, flexShrink:0}} />
    </div>
  );
}

/* ── 8. Tools ───────────────────────────────────────────── */

  const SUGGESTIONS = [
    { tool: TOOLS_DATA.find(t => t.id==='claude'),     priority:'HIGH', msg:"You haven't opened Claude recently.", action:'Open' },

            { label:'CONNECTED',   val:`${connected.length} / ${TOOLS_DATA.length}`, sub:`${connected.length} tools used`       },

                <div style={{flex:1, minWidth:0}}>

                    <span style={{fontFamily:T.mono, fontSize:7, padding:'1px 5px', background: sg.priority==='HIGH' ? 'rgba(191,74,48,0.1)' : T.bl, color: sg.priority==='HIGH' ? '#bf4a30' : T.ink3, letterSpacing:'0.07em'}}>{sg.priority}</span>
                  </div>
                  <div style={{fontFamily:T.ui, fontSize:11.5, color:T.ink3}}>{sg.msg}</div>
                  {sg.priority === 'HIGH' && <div style={{fontFamily:T.mono, fontSize:8, color:T.ink3, marginTop:3}}>1 total sessions · Last: 8d ago</div>}

          <div style={{background:T.surface, padding:'16px 20px'}}>

                  <div style={{width:'100%', height:'100%', background:tool.color, opacity:0.65}} />

            <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:12}}>
              <span style={{color:T.accent, fontSize:11, lineHeight:1}}>★</span>
              <div style={{fontFamily:T.mono, fontSize:7.5, color:T.ink3, textTransform:'uppercase', letterSpacing:'0.13em'}}>Usage Insight</div>
            </div>
            <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:15, color:T.ink3, lineHeight:1.65}}>Use your tools to generate insights.</div>

        </div>

        {/* Filter tabs */}
        <div style={{display:'flex', gap:1, background:T.border, marginBottom:1}}>
          {cats.map(c => {
            const count = c === 'ALL' ? TOOLS_DATA.length : TOOLS_DATA.filter(t => t.cat===c).length;
            const act = filter === c;
            return (
              <button key={c} onClick={() => setFilter(c)} style={{
                padding:'8px 16px', border:'none',
                background: act ? T.surface : T.bl,
                color: act ? T.accent : T.ink3,
                fontFamily:T.mono, fontSize:8.5, letterSpacing:'0.09em',
                borderBottom: act ? `2px solid ${T.accent}` : '2px solid transparent',
                cursor:'pointer', transition:'all 0.12s', whiteSpace:'nowrap',
              }}>
                {c} <span style={{opacity:0.55}}>{count}</span>
              </button>
            );

          <div style={{flex:1, background:T.surface, display:'flex', alignItems:'center', justifyContent:'flex-end', padding:'0 14px'}}>
            <div style={{fontFamily:T.mono, fontSize:8, color:T.ink3}}>{filtered.length} tools</div>
          </div>
        </div>

        {/* Table header */}
        <div style={{display:'grid', gridTemplateColumns:'1fr 100px 80px 80px 70px', gap:10, padding:'7px 14px', background:T.surface, borderBottom:`1px solid ${T.border}`}}>
          {['TOOL','TO ACTIVITY','SESSIONS','LAST USED','TREND'].map((h,i) => (
            <div key={h} style={{fontFamily:T.mono, fontSize:7.5, color:T.ink3, textTransform:'uppercase', letterSpacing:'0.1em', textAlign: i>0 ? 'center' : 'left'}}>{h}</div>

        {/* Tool rows */}
        <div style={{background:T.border, display:'flex', flexDirection:'column', gap:1}}>
          {filtered.map(tool => (
            <div key={tool.id}
              style={{display:'grid', gridTemplateColumns:'1fr 100px 80px 80px 70px', gap:10, padding:'11px 14px', background:T.surface, alignItems:'center', cursor:'pointer', transition:'background 0.1s'}}
              onMouseOver={e => e.currentTarget.style.background = T.bl}
              onMouseOut={e => e.currentTarget.style.background = T.surface}
            >
              <div style={{display:'flex', alignItems:'center', gap:11, minWidth:0}}>
                <ToolIcon tool={tool} size={26} />
                <div style={{minWidth:0}}>
                  <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:2}}>
                    <span style={{fontFamily:T.ui, fontSize:13, color:T.ink, fontWeight:500}}>{tool.name}</span>
                    <span style={{fontFamily:T.mono, fontSize:7, padding:'1.5px 5px', background:T.bl, color:T.ink3, letterSpacing:'0.07em'}}>{tool.cat}</span>

              </div>
              <Spark tool={tool} />
              <div style={{fontFamily:T.mono, fontSize:11, color: tool.sessions > 0 ? T.ink : T.ink3, textAlign:'center'}}>{tool.sessions}</div>
              <div style={{fontFamily:T.mono, fontSize:11, color:T.ink3, textAlign:'center'}}>{tool.lastUsed}</div>
              <div style={{fontFamily:T.mono, fontSize:11, color: tool.trend < 0 ? '#bf4a30' : T.ink3, textAlign:'center'}}>

      </div>

      {/* ── Right sidebar ── */}
      <div style={{width:216, borderLeft:`1px solid ${T.border}`, display:'flex', flexDirection:'column', overflow:'hidden', flexShrink:0}}>

        {/* Quick Launch */}
        <div style={{padding:'16px 18px', borderBottom:`1px solid ${T.border}`, flex:'0 0 auto'}}>
          <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}}>
            <div style={{fontFamily:T.mono, fontSize:7.5, color:T.ink3, textTransform:'uppercase', letterSpacing:'0.13em'}}>Quick Launch</div>
            <div style={{fontFamily:T.mono, fontSize:8, color:T.ink3}}>⌘1-4</div>
          </div>
          {QUICK_LAUNCH.map((ql,i) => (
            <div key={i}
              style={{display:'flex', alignItems:'center', gap:9, padding:'8px 0', borderBottom: i < QUICK_LAUNCH.length-1 ? `1px solid ${T.bl}` : 'none', cursor:'pointer'}}
              onMouseOver={e => e.currentTarget.style.background = T.bl}
              onMouseOut={e => e.currentTarget.style.background = 'transparent'}
            >
              <ToolIcon tool={ql.tool} size={22} />
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontFamily:T.ui, fontSize:11.5, color:T.ink, fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', marginBottom:1}}>{ql.label}</div>

              <div style={{fontFamily:T.mono, fontSize:8, color:T.ink3, flexShrink:0}}>{ql.key}</div>
            </div>
          ))}
          <div style={{marginTop:10, paddingTop:9, borderTop:`1px solid ${T.bl}`, display:'flex', justifyContent:'space-between'}}>
            <span style={{fontFamily:T.mono, fontSize:8.5, color:T.ink3, cursor:'pointer'}}>Browse all tools</span>
            <span style={{fontFamily:T.mono, fontSize:8, color:T.ink3, opacity:0.5}}>⌘5</span>
          </div>
        </div>

        {/* Activity */}

          <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}}>

            <div style={{display:'flex', alignItems:'center', gap:5}}>
              <div style={{width:5, height:5, borderRadius:'50%', background:'#3a8a52'}} />
              <div style={{fontFamily:T.mono, fontSize:8, color:'#3a8a52'}}>Live</div>
            </div>
          </div>
          <div style={{fontFamily:T.ui, fontSize:12, color:T.ink3, lineHeight:1.7}}>No activity yet. Open a tool to start tracking.</div>
        </div>

      </div>
    </div>
  );
}

/* ── 9. Subjects ────────────────────────────────────────── */
function SubjectsScreen() {
  return (
    <div className="screen-enter" style={{flex:1, overflowY:'auto', padding:'56px 72px'}}>
      <PageHeader eyebrow={`${SUBJECTS.length} subjects · Spring 2025`} title="Subjects" />
      <Hr />
      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))', gap:1, background:T.border}}>
        {SUBJECTS.map(s => {
          const sc = HIST[s.id] || [80,80,80,80,80];
          const pts = sc.map((v,i) => `${i*34+4},${26-(v-70)/30*22}`).join(' ');
          const hw = HOMEWORK.filter(h => h.subj === s.id && !h.done);
          const qz = QUIZZES_DATA.filter(q => q.subj === s.id);
          return (
            <div key={s.id} style={{background:T.surface, padding:'26px 28px'}}>
              <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:18}}>
                <div>
                  <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:7}}>
                    <div style={{width:7, height:7, borderRadius:2, background:s.color}} />
                    <div style={{fontFamily:T.mono, fontSize:8, color:T.ink3, letterSpacing:'0.12em', textTransform:'uppercase'}}>{s.id}</div>
                  </div>
                  <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:20, color:T.ink, lineHeight:1.2}}>{s.name}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:36, color:T.accent, lineHeight:0.92, letterSpacing:'-0.02em'}}>{s.grade}</div>
                  <div style={{fontFamily:T.mono, fontSize:8.5, color:T.ink3, marginTop:4}}>{Math.round(s.pct*100)}%</div>
                </div>
              </div>
              <div style={{height:2, background:T.border, marginBottom:14, borderRadius:1, overflow:'hidden'}}>
                <div style={{width:`${s.pct*100}%`, height:'100%', background:s.color, borderRadius:1}} />
              </div>
              <div style={{marginBottom:16}}>
                <svg width="100%" height={28} viewBox="0 0 140 28" preserveAspectRatio="none" style={{display:'block'}}>
                  <polyline points={pts} fill="none" stroke={T.border} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round"/>
                  {sc.map((v,i) => <circle key={i} cx={i*34+4} cy={26-(v-70)/30*22} r={2.5} fill={s.color} opacity={0.8}/>)}
                </svg>
              </div>
              <div style={{display:'flex', gap:14, borderTop:`1px solid ${T.bl}`, paddingTop:14}}>
                {[['GPA', s.gpa.toFixed(1), false], ['HW open', hw.length, hw.length > 0], ['Quizzes', qz.length, false]].map(([label, val, warn]) => (
                  <div key={label}>
                    <div style={{fontFamily:T.mono, fontSize:8, color:T.ink3, textTransform:'uppercase', letterSpacing:'0.1em', marginBottom:3}}>{label}</div>
                    <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:20, color: warn ? T.accent : T.ink}}>{val}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── App ────────────────────────────────────────────────── */
const SCREENS = {
  today:      TodayScreen,
  homework:   HomeworkScreen,
  quizzes:    QuizzesScreen,
  notes:      NotesScreen,
  flashcards: FlashcardsScreen,
  schedule:   ScheduleScreen,
  grades:     GradesScreen,
  tools:      ToolsScreen,
  subjects:   SubjectsScreen,
};

function App() {
  const [screen, setScreen] = useState('today');
  const [key, setKey] = useState(0);
  const nav = (s) => { setScreen(s); setKey(k => k+1); };
  const Screen = SCREENS[screen] || TodayScreen;

  return (
    <div style={{height:'100vh', display:'flex', overflow:'hidden', background:T.bg, fontFamily:T.ui, color:T.ink}}>
      <Sidebar screen={screen} onNav={nav} />
      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        <Screen key={key} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scholar — Academic Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  #root { height: 100vh; overflow: hidden; }
  button { cursor: pointer; font-family: inherit; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e0d8cc; border-radius: 2px; }
  @keyframes screen-in {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .screen-enter { animation: screen-in 0.2s ease forwards; }
  @keyframes shq-modal-fade-in { from { opacity:0 } to { opacity:1 } }
  @keyframes shq-modal-fade-out { from { opacity:1 } to { opacity:0 } }
  @keyframes shq-modal-slide-up {
    0%   { opacity:0; transform:translateY(16px) scale(0.96); }
    100% { opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes shq-modal-slide-down {
    0%   { opacity:1; transform:translateY(0) scale(1); }
    100% { opacity:0; transform:translateY(10px) scale(0.97); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scholar — Academic Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  #root { height: 100vh; overflow: hidden; }
  button { cursor: pointer; font-family: inherit; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e0d8cc; border-radius: 2px; }
  @keyframes screen-in {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .screen-enter { animation: screen-in 0.2s ease forwards; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Theme ──────────────────────────────────────────────── */
const T = {
  bg:         '#f8f6f0',
  surface:    '#ffffff',
  ink:        '#18150e',
  ink2:       '#5a5240',
  ink3:       '#9a9080',
  accent:     '#b8943a',
  accentSoft: 'rgba(184,148,58,0.08)',
  border:     '#e8e2d8',
  bl:         '#f0ece4',
  serif:      '"Cormorant Garamond",Georgia,serif',
  ui:         '"DM Sans",sans-serif',
  mono:       '"Geist Mono",monospace',
};

/* ── Data ───────────────────────────────────────────────── */
const SUBJECTS = [
  { id:'ap-lit',  name:'AP English Lit', short:'AP Lit',  color:'#bf4a30', grade:'A−', gpa:3.7, pct:0.94 },
  { id:'ap-bio',  name:'AP Biology',     short:'Bio',     color:'#3a8a52', grade:'B+', gpa:3.3, pct:0.87 },
  { id:'alg2',    name:'Algebra II',     short:'Alg II',  color:'#2a60a0', grade:'A',  gpa:4.0, pct:0.91 },
  { id:'us-hist', name:'U.S. History',   short:'History', color:'#b07020', grade:'B',  gpa:3.0, pct:0.82 },
  { id:'spanish', name:'Spanish III',    short:'Spanish', color:'#7a44a0', grade:'A−', gpa:3.7, pct:0.89 },
  { id:'chem',    name:'Chemistry',      short:'Chem',    color:'#208490', grade:'B+', gpa:3.3, pct:0.78 },
];

const HOMEWORK = [
  { subj:'ap-lit',  title:'Read Beloved ch. 9–12',           due:'Tonight',  urgent:true,  done:false, est:'45 min'      },
  { subj:'alg2',    title:'Problem Set 7.3 — identities',    due:'Tomorrow', urgent:true,  done:false, est:'30 min'      },
  { subj:'ap-bio',  title:'Lab report: enzyme kinetics',     due:'Wed',      urgent:false, done:false, est:'1 hr 30 min' },
  { subj:'us-hist', title:'Federalist No. 10 response',      due:'Thu',      urgent:false, done:false, est:'1 hr'        },
  { subj:'spanish', title:'Vocabulario unidad 6 flashcards', due:'Fri',      urgent:false, done:false, est:'20 min'      },
  { subj:'chem',    title:'Moles & Avogadro problem set',    due:'Done',     urgent:false, done:true,  est:'45 min'      },
];

const QUIZZES_DATA = [
  { subj:'alg2',    title:'Unit 7 — Trig Identities',  date:'Tomorrow', topics:['sin/cos identities','sum formulas','double-angle'], confidence:0.72 },
  { subj:'ap-bio',  title:'Enzyme Kinetics Quiz',       date:'Wed',      topics:['Michaelis-Menten','inhibition','Km & Vmax'],       confidence:0.58 },
  { subj:'ap-lit',  title:'Beloved — Chapters 1–12',   date:'Fri',      topics:['trauma & memory','rememory','Morrison style'],      confidence:0.81 },
  { subj:'us-hist', title:'The Federalist Era Test',    date:'Next Mon', topics:['Hamilton vs Jefferson','XYZ Affair','Jay Treaty'],  confidence:0.45 },
];

const NOTES_DATA = [
  { id:'n1', subj:'alg2',    title:'Trig Identities — Cheat Sheet', date:'Jun 12', preview:'sin²θ + cos²θ = 1. All Pythagorean identities derive from this. tan θ = sin θ / cos θ…'        },
  { id:'n2', subj:'ap-bio',  title:'Enzyme Kinetics Lab Notes',      date:'Jun 11', preview:'Michaelis-Menten: v = (Vmax·[S]) / (Km+[S]). At low [S] rate is roughly linear…'               },
  { id:'n3', subj:'ap-lit',  title:'Beloved — Memory & Trauma',      date:'Jun 10', preview:'Morrison uses "rememory" as central motif — the past physically intrudes on the present…'        },
  { id:'n4', subj:'us-hist', title:'Federalist Papers Summary',       date:'Jun 9',  preview:'Federalist No. 10 argues a large republic guards against faction better than a small one…'      },
  { id:'n5', subj:'spanish', title:'Unidad 6 — Reflexive Verbs',     date:'Jun 8',  preview:'Los verbos reflexivos: me llamo, te llamas, se llama. Subject and object are the same person…'  },
  { id:'n6', subj:'chem',    title:'Moles & Avogadro\'s Number',     date:'Jun 7',  preview:'1 mole = 6.022 × 10²³ particles. Molar mass in g/mol equals atomic mass in amu…'               },
];

const SCHEDULE_DATA = [
  { period:'1', label:'First',  time:'8:00 – 8:50 AM',   subj:'ap-lit',  room:'B204',    current:false },
  { period:'2', label:'Second', time:'9:00 – 9:50 AM',   subj:'alg2',    room:'A112',    current:true  },
  { period:'3', label:'Third',  time:'10:00 – 10:50 AM', subj:'us-hist', room:'C301',    current:false },
  { period:'L', label:'Lunch',  time:'11:00 – 11:45 AM', subj:null,      room:null,      current:false },
  { period:'4', label:'Fourth', time:'11:45 AM – 12:35', subj:'ap-bio',  room:'B106',    current:false },
  { period:'5', label:'Fifth',  time:'12:45 – 1:35 PM',  subj:'spanish', room:'A205',    current:false },
  { period:'6', label:'Sixth',  time:'1:45 – 2:35 PM',   subj:'chem',    room:'B108',    current:false },
  { period:'7', label:'Study',  time:'2:45 – 3:30 PM',   subj:null,      room:'Library', current:false },
];

const DECKS = [
  { name:'Cellular Respiration', subj:'ap-bio',  n:12, m:9,  due:3 },
  { name:'Limits & Derivatives', subj:'alg2',    n:18, m:11, due:7 },
  { name:'Federalist Era',       subj:'us-hist', n:10, m:10, due:0 },
  { name:'Toni Morrison Themes', subj:'ap-lit',  n:14, m:6,  due:8 },
];

const QUIZ = [
  { q:'What is the Central Limit Theorem?', a:'Sample mean distribution approaches normal as n increases, regardless of population shape.',                 subj:'alg2'   },
  { q:'Define cellular respiration.',       a:'Glucose + O₂ → ATP + CO₂ + H₂O via glycolysis, Krebs cycle, and electron transport chain.',               subj:'ap-bio' },
  { q:'lim x→0  sin(x) / x',              a:'Equals 1. The fundamental trig limit — foundation for d/dx[sin x] = cos x.',                                subj:'alg2'   },
];

const HIST = {
  'ap-lit':  [92,95,89,97,94],
  'ap-bio':  [82,85,88,84,87],
  'alg2':    [94,89,91,93,91],
  'us-hist': [80,83,79,81,82],
  'spanish': [90,87,91,88,89],
  'chem':    [76,78,80,77,78],
};

const GPA_MAP = { 'A+':4.0,'A':4.0,'A−':3.7,'B+':3.3,'B':3.0,'B−':2.7,'C+':2.3,'C':2.0,'C−':1.7,'D':1.0,'F':0 };
const GPA = (SUBJECTS.reduce((a,s) => a + s.gpa, 0) / SUBJECTS.length).toFixed(2);
const subjectBy = (id) => SUBJECTS.find(s => s.id === id) || SUBJECTS[0];

function greeting() {
  const h = new Date().getHours();
  if (h < 5)  return 'Up late.';
  if (h < 12) return 'Good morning.';
  if (h < 17) return 'Good afternoon.';
  return 'Good evening.';
}
function formatDate() {
  return new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}

/* ── Icons ──────────────────────────────────────────────── */
const ICO = {
  today:      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="8" r="5.5"/><path d="M8 5.5V8l2 1.2"/></svg>,
  homework:   <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="2" width="10" height="12" rx="1"/><path d="M5 6.5l1.5 1.5L9 5M5 10.5l1.5 1.5L9 9"/></svg>,
  quizzes:    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"><circle cx="8" cy="8" r="5.5"/><path d="M6.5 6.3a1.6 1.6 0 1 1 2 1.4V9M8 11v.1"/></svg>,
  notes:      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><path d="M4 2h5.5l3.5 3.5V14H4V2zm5.5 0v3.5H13M5.5 8h5M5.5 11h3"/></svg>,
  flashcards: <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="5" width="10" height="8" rx="1"/><path d="M5 3h8.5v7.5"/></svg>,
  schedule:   <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="3" width="12" height="11" rx="1"/><path d="M2 7h12M5.5 1.5v3M10.5 1.5v3"/></svg>,
  grades:     <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><path d="M8 2l1.6 3.8 4 .5-2.9 2.8.7 4-3.4-1.9-3.4 1.9.7-4L2.4 6.3l4-.5z"/></svg>,
  tools:      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="4.5" height="4.5" rx="0.8"/><rect x="9.5" y="2" width="4.5" height="4.5" rx="0.8"/><rect x="2" y="9.5" width="4.5" height="4.5" rx="0.8"/><rect x="9.5" y="9.5" width="4.5" height="4.5" rx="0.8"/></svg>,
  subjects:   <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"><path d="M2 2h5v5H2zM9 2h5v5H9zM2 9h5v5H2zM9 9h5v5H9z"/></svg>,
};

/* ── Navigation config ──────────────────────────────────── */
const NAV = [
  { id:'today',      label:'Today',      icon: ICO.today      },
  { id:'homework',   label:'Homework',   icon: ICO.homework   },
  { id:'quizzes',    label:'Quizzes',    icon: ICO.quizzes    },
  { id:'notes',      label:'Notes',      icon: ICO.notes      },
  { id:'flashcards', label:'Flashcards', icon: ICO.flashcards },
  { id:'schedule',   label:'Schedule',   icon: ICO.schedule   },
  { id:'grades',     label:'Grades',     icon: ICO.grades     },
  { id:'tools',      label:'Tools',      icon: ICO.tools      },
  { id:'subjects',   label:'Subjects',   icon: ICO.subjects   },
];

/* ── Sidebar ────────────────────────────────────────────── */
function Sidebar({ screen, onNav }) {
  return (
    <aside style={{
      width:200, flexShrink:0,
      background:T.surface,
      borderRight:`1px solid ${T.border}`,
      display:'flex', flexDirection:'column', overflow:'hidden',
    }}>
      {/* Brand */}
      <div style={{padding:'26px 22px 22px', borderBottom:`1px solid ${T.border}`, flexShrink:0}}>
        <div style={{width:36, height:36, border:`1px solid ${T.accent}`, display:'flex', alignItems:'center', justifyContent:'center', marginBottom:11}}>
          <span style={{fontFamily:T.serif, fontStyle:'italic', fontSize:21, color:T.accent, lineHeight:1}}>J</span>
        </div>
        <div style={{fontFamily:T.mono, fontSize:8, color:T.ink3, letterSpacing:'0.17em', textTransform:'uppercase'}}>Scholar</div>
      </div>

      {/* Nav */}
      <div style={{padding:'10px 0', borderBottom:`1px solid ${T.border}`, flexShrink:0}}>
        {NAV.map(item => {
          const act = screen === item.id;
          return (
            <button
              key={item.id}
              onClick={() => onNav(item.id)}
              style={{
                display:'flex', alignItems:'center', gap:9,
                width:'100%', padding:'7px 22px',
                border:'none', borderLeft:`2px solid ${act ? T.accent : 'transparent'}`,
                background: act ? T.accentSoft : 'transparent',
                color: act ? T.ink : T.ink3,
                fontSize:13, fontFamily:T.ui, textAlign:'left',
                fontWeight: act ? 500 : 400,
                transition:'background 0.12s, color 0.12s',
              }}
              onMouseOver={e => { if (!act) e.currentTarget.style.background = T.bl; }}
              onMouseOut={e => { if (!act) e.currentTarget.style.background = 'transparent'; }}
            >
              <span style={{flexShrink:0, opacity: act ? 1 : 0.55, display:'flex'}}>{item.icon}</span>
              {item.label}
            </button>
          );
        })}
      </div>

      {/* Subjects quick list */}
      <div style={{flex:1, overflow:'auto', padding:'16px 0'}}>
        <div style={{fontFamily:T.mono, fontSize:7.5, color:T.ink3, textTransform:'uppercase', letterSpacing:'0.16em', padding:'0 22px', marginBottom:8}}>Subjects</div>
        {SUBJECTS.map(s => (
          <div
            key={s.id}
            onClick={() => onNav('subjects')}
            style={{display:'flex', alignItems:'center', gap:9, padding:'5px 22px', fontSize:12.5, color:T.ink2, cursor:'pointer'}}
            onMouseOver={e => e.currentTarget.style.background = T.bl}
            onMouseOut={e => e.currentTarget.style.background = 'transparent'}
          >
            <div style={{width:6, height:6, borderRadius:1.5, background:s.color, flexShrink:0}} />
            <span style={{flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{s.short}</span>
            <span style={{fontFamily:T.mono, fontSize:8, color:s.color, fontWeight:600, flexShrink:0}}>{s.grade}</span>
          </div>
        ))}
      </div>

      {/* User */}
      <div style={{padding:'13px 22px', borderTop:`1px solid ${T.border}`, flexShrink:0}}>
        <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:14, color:T.ink, marginBottom:3, lineHeight:1.2}}>Julian R.</div>
        <div style={{fontFamily:T.mono, fontSize:8, color:T.ink3, letterSpacing:'0.07em'}}>Junior · streak 12</div>
      </div>
    </aside>
  );
}

/* ── Shared ─────────────────────────────────────────────── */
function PageHeader({ eyebrow, title, right }) {
  return (
    <div style={{display:'flex', alignItems:'flex-end', justifyContent:'space-between', marginBottom:40, flexWrap:'wrap', gap:16}}>
      <div>
        {eyebrow && <div style={{fontFamily:T.mono, fontSize:8.5, color:T.ink3, letterSpacing:'0.15em', textTransform:'uppercase', marginBottom:12}}>{eyebrow}</div>}
        <h1 style={{fontFamily:T.serif, fontStyle:'italic', fontSize:'clamp(36px,4.5vw,56px)', fontWeight:400, color:T.ink, margin:0, letterSpacing:'-0.025em', lineHeight:1.04}}>{title}</h1>
      </div>
      {right && <div style={{textAlign:'right'}}>{right}</div>}
    </div>
  );
}
function Hr({ mb=32 }) { return <div style={{height:1, background:T.border, marginBottom:mb}} />; }

/* ── 1. Today ───────────────────────────────────────────── */
function TodayScreen() {
  const open = HOMEWORK.filter(h => !h.done);
  return (
    <div className="screen-enter" style={{flex:1, overflowY:'auto', padding:'56px 72px'}}>
      <PageHeader
        eyebrow={formatDate()}
        title={greeting()}
        right={
          <>
            <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:'clamp(52px,6.5vw,82px)', color:T.accent, lineHeight:0.86, letterSpacing:'-0.04em'}}>{GPA}</div>
            <div style={{fontFamily:T.mono, fontSize:8.5, color:T.ink3, letterSpacing:'0.14em', textTransform:'uppercase', marginTop:9}}>Grade point average</div>
          </>
        }
      />
      <Hr />
      {open.map(h => {
        const s = subjectBy(h.subj);
        return (
          <div key={h.title} style={{display:'flex', alignItems:'baseline', gap:16, padding:'13px 0', borderBottom:`1px solid ${T.bl}`}}>
            <div style={{flex:1, fontFamily:T.serif, fontSize:18, color:T.ink, lineHeight:1.3}}>{h.title}</div>
            <div style={{fontFamily:T.mono, fontSize:9, color:T.ink3, letterSpacing:'0.07em', textTransform:'uppercase', flexShrink:0}}>{s.name}</div>
            <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:14, color:h.urgent ? T.accent : T.ink3, minWidth:70, textAlign:'right', flexShrink:0}}>{h.due}</div>
          </div>
        );
      })}
      <Hr mb={0} />
      <div style={{height:28}} />
      <div style={{display:'flex', flexWrap:'wrap'}}>
        {SUBJECTS.map((s,i) => (
          <div key={s.id} style={{flex:1, minWidth:56, textAlign:'center', borderRight: i < SUBJECTS.length-1 ? `1px solid ${T.border}` : 'none', padding:'2px 4px'}}>
            <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:30, color:T.accent, lineHeight:1, letterSpacing:'-0.02em'}}>{s.grade}</div>
            <div style={{fontFamily:T.mono, fontSize:7.5, color:T.ink3, letterSpacing:'0.12em', textTransform:'uppercase', marginTop:6}}>{s.short}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── 2. Homework ────────────────────────────────────────── */
function HomeworkScreen() {
  const open = HOMEWORK.filter(h => !h.done);
  const done = HOMEWORK.filter(h => h.done);
  const COL = '1fr 150px 80px 88px';
  const ColHdr = () => (
    <div style={{display:'grid', gridTemplateColumns:COL, gap:16, padding:'9px 0', borderBottom:`1px solid ${T.border}`}}>
      {['Assignment','Subject','Due','Est.'].map((c,i) => (
        <div key={c} style={{fontFamily:T.mono, fontSize:7.5, color:T.ink3, textTransform:'uppercase', letterSpacing:'0.13em', textAlign:i>0?'right':'left'}}>{c}</div>
      ))}
    </div>
  );
  return (
    <div className="screen-enter" style={{flex:1, overflowY:'auto', padding:'56px 72px'}}>
      <PageHeader eyebrow={`${open.length} open · ${done.length} complete`} title="Assignments" />
      <ColHdr />
      {open.map(h => {
        const s = subjectBy(h.subj);
        return (
          <div key={h.title} style={{display:'grid', gridTemplateColumns:COL, gap:16, padding:'13px 0', borderBottom:`1px solid ${T.bl}`, alignItems:'baseline'}}>
            <div style={{fontFamily:T.serif, fontSize:17, color:T.ink, lineHeight:1.3}}>{h.title}</div>
            <div style={{fontFamily:T.mono, fontSize:9.5, color:T.ink3, textAlign:'right'}}>{s.name}</div>
            <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:14, color:h.urgent ? T.accent : T.ink3, textAlign:'right'}}>{h.due}</div>
            <div style={{fontFamily:T.mono, fontSize:9.5, color:T.ink3, textAlign:'right'}}>{h.est}</div>
          </div>
        );
      })}
      {done.length > 0 && (
        <div style={{marginTop:36, opacity:0.4}}>
          <ColHdr />
          {done.map(h => {
            const s = subjectBy(h.subj);
            return (
              <div key={h.title} style={{display:'grid', gridTemplateColumns:COL, gap:16, padding:'12px 0', borderBottom:`1px solid ${T.bl}`, alignItems:'baseline'}}>
                <div style={{fontFamily:T.serif, fontSize:17, color:T.ink2, textDecoration:'line-through', lineHeight:1.3}}>{h.title}</div>
                <div style={{fontFamily:T.mono, fontSize:9.5, color:T.ink3, textAlign:'right'}}>{s.name}</div>
                <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:14, color:T.ink3, textAlign:'right'}}>Done</div>
                <div style={{fontFamily:T.mono, fontSize:9.5, color:T.ink3, textAlign:'right'}}>{h.est}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ── 3. Quizzes ─────────────────────────────────────────── */
function QuizzesScreen() {
  const cc = (c) => c >= 0.75 ? '#3a8a52' : c >= 0.55 ? '#b07020' : '#bf4a30';
  const cl = (c) => c >= 0.75 ? 'strong' : c >= 0.55 ? 'fair' : 'weak';
  return (
    <div className="screen-enter" style={{flex:1, overflowY:'auto', padding:'56px 72px'}}>
      <PageHeader eyebrow={`${QUIZZES_DATA.length} upcoming`} title="Quizzes" />
      <Hr />
      <div style={{display:'flex', flexDirection:'column', gap:1, background:T.border}}>
        {QUIZZES_DATA.map(q => {
          const s = subjectBy(q.subj);
          const pct = Math.round(q.confidence * 100);
          return (
            <div key={q.title} style={{background:T.surface, padding:'26px 32px', display:'grid', gridTemplateColumns:'1fr auto', gap:20, alignItems:'start'}}>
              <div>
                <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:11}}>
                  <div style={{width:7, height:7, borderRadius:2, background:s.color}} />
                  <div style={{fontFamily:T.mono, fontSize:8.5, color:T.ink3, letterSpacing:'0.12em', textTransform:'uppercase'}}>{s.name}</div>
                </div>
                <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:24, color:T.ink, lineHeight:1.25, marginBottom:14}}>{q.title}</div>
                <div style={{display:'flex', flexWrap:'wrap', gap:7}}>
                  {q.topics.map(t => (
                    <span key={t} style={{fontFamily:T.mono, fontSize:9, color:T.ink2, background:T.bl, padding:'3px 9px', letterSpacing:'0.02em'}}>{t}</span>
                  ))}
                </div>
              </div>

/* ── 8. Tools ───────────────────────────────────────────── */
function ToolsScreen() {
  const GRADE_OPTS = ['A+','A','A−','B+','B','B−','C+','C','C−','D','F'];
  const [hypo, setHypo] = useState(() => Object.fromEntries(SUBJECTS.map(s => [s.id, s.grade])));
  const hypoGPA = (() => {
    const vals = SUBJECTS.map(s => GPA_MAP[hypo[s.id]] ?? s.gpa);
    return (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(2);
  })();
  const gpaDelta = (parseFloat(hypoGPA) - parseFloat(GPA)).toFixed(2);

  const [estSubj, setEstSubj] = useState('ap-bio');
  const [curPct, setCurPct] = useState(87);
  const [tgtGrade, setTgtGrade] = useState('A−');
  const [remWeight, setRemWeight] = useState(20);

  const needed = (() => {
    const tgtPct = tgtGrade === 'A+' || tgtGrade === 'A' ? 0.93 : tgtGrade === 'A−' ? 0.90 : tgtGrade === 'B+' ? 0.87 : tgtGrade === 'B' ? 0.83 : 0.73;
    const w = remWeight / 100;
    if (w <= 0) return null;
    return Math.round(((tgtPct - (curPct/100) * (1-w)) / w) * 100);
  })();

  const input = { background:T.bl, border:`1px solid ${T.border}`, padding:'7px 10px', fontFamily:T.mono, fontSize:11, color:T.ink, borderRadius:0, outline:'none', width:'100%' };
  const sel = { ...input, cursor:'pointer', appearance:'none' };

  return (
    <div className="screen-enter" style={{flex:1, overflowY:'auto', padding:'56px 72px'}}>
      <PageHeader eyebrow="Academic tools" title="Tools" />
      <Hr />
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:1, background:T.border}}>

        {/* GPA Calculator */}
        <div style={{background:T.surface, padding:'30px 34px'}}>
          <div style={{fontFamily:T.mono, fontSize:8, color:T.ink3, textTransform:'uppercase', letterSpacing:'0.14em', marginBottom:16}}>GPA Calculator</div>
          <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:50, color:T.accent, lineHeight:0.92, letterSpacing:'-0.03em', marginBottom:6}}>{hypoGPA}</div>
          <div style={{fontFamily:T.mono, fontSize:8.5, color:T.ink3, letterSpacing:'0.08em', marginBottom:22}}>
            {parseFloat(gpaDelta) > 0 ? `↑ +${gpaDelta}` : parseFloat(gpaDelta) < 0 ? `↓ ${gpaDelta}` : `= current`} {parseFloat(gpaDelta) !== 0 ? `from ${GPA}` : ''}
          </div>
          <div style={{display:'flex', flexDirection:'column', gap:7}}>
            {SUBJECTS.map(s => (
              <div key={s.id} style={{display:'flex', alignItems:'center', gap:10}}>
                <div style={{width:6, height:6, borderRadius:1.5, background:s.color, flexShrink:0}} />
                <div style={{fontFamily:T.ui, fontSize:12.5, color:T.ink2, flex:1}}>{s.short}</div>
                <div style={{width:68}}>
                  <select value={hypo[s.id]} onChange={e => setHypo({...hypo, [s.id]:e.target.value})} style={sel}>
                    {GRADE_OPTS.map(g => <option key={g} value={g}>{g}</option>)}
                  </select>
                </div>
              </div>
            ))}
          </div>
          <button
            onClick={() => setHypo(Object.fromEntries(SUBJECTS.map(s => [s.id, s.grade])))}
            style={{marginTop:18, background:'none', border:`1px solid ${T.border}`, padding:'6px 14px', fontFamily:T.mono, fontSize:8.5, color:T.ink3, letterSpacing:'0.1em', textTransform:'uppercase', cursor:'pointer', transition:'border-color 0.12s'}}
            onMouseOver={e => e.currentTarget.style.borderColor = T.accent}
            onMouseOut={e => e.currentTarget.style.borderColor = T.border}
          >Reset</button>
        </div>

        {/* Grade Estimator */}
        <div style={{background:T.surface, padding:'30px 34px'}}>
          <div style={{fontFamily:T.mono, fontSize:8, color:T.ink3, textTransform:'uppercase', letterSpacing:'0.14em', marginBottom:16}}>Grade Estimator</div>
          <div style={{fontFamily:T.ui, fontSize:12.5, color:T.ink3, lineHeight:1.7, marginBottom:22}}>What score do I need on remaining work to hit my target?</div>
          <div style={{display:'flex', flexDirection:'column', gap:12}}>
            <div>
              <div style={{fontFamily:T.mono, fontSize:7.5, color:T.ink3, textTransform:'uppercase', letterSpacing:'0.12em', marginBottom:5}}>Subject</div>
              <select value={estSubj} onChange={e => setEstSubj(e.target.value)} style={sel}>
                {SUBJECTS.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
              <div>
                <div style={{fontFamily:T.mono, fontSize:7.5, color:T.ink3, textTransform:'uppercase', letterSpacing:'0.12em', marginBottom:5}}>Current %</div>
                <input type="number" min={0} max={100} value={curPct} onChange={e => setCurPct(Number(e.target.value))} style={input} />
              </div>
              <div>
                <div style={{fontFamily:T.mono, fontSize:7.5, color:T.ink3, textTransform:'uppercase', letterSpacing:'0.12em', marginBottom:5}}>Target grade</div>
                <select value={tgtGrade} onChange={e => setTgtGrade(e.target.value)} style={sel}>
                  {['A+','A','A−','B+','B','B−'].map(g => <option key={g} value={g}>{g}</option>)}
                </select>
              </div>
            </div>
            <div>
              <div style={{fontFamily:T.mono, fontSize:7.5, color:T.ink3, textTransform:'uppercase', letterSpacing:'0.12em', marginBottom:5}}>Remaining work weight (%)</div>
              <input type="number" min={1} max={100} value={remWeight} onChange={e => setRemWeight(Number(e.target.value))} style={input} />
            </div>
          </div>
          {needed !== null && (
            <div style={{marginTop:24, borderTop:`1px solid ${T.border}`, paddingTop:22}}>
              <div style={{fontFamily:T.mono, fontSize:8, color:T.ink3, textTransform:'uppercase', letterSpacing:'0.12em', marginBottom:7}}>You need</div>
              <div style={{fontFamily:T.serif, fontStyle:'italic', fontSize:50, color: needed <= 100 ? T.accent : '#bf4a30', lineHeight:0.92, letterSpacing:'-0.03em', marginBottom:8}}>
                {needed < 0 ? 'Done ✓' : needed > 110 ? 'Not possible' : `${needed}%`}
              </div>
              <div style={{fontFamily:T.ui, fontSize:12.5, color:T.ink3, lineHeight:1.6}}>
                {needed < 0 ? 'You already exceed this target grade.' : needed > 110 ? 'Target is not achievable with this remaining weight.' : needed > 97 ? 'Very high bar — near-perfect score needed.' : needed > 90 ? 'Challenging but achievable with strong effort.' : 'Well within reach with consistent work.'}
              </div>
            </div>
          )}
        </div>

      </div>
    </div>
  );
}

  grades:     GradesScreen,
  tools:      ToolsScreen,
  subjects:   SubjectsScreen,
};

function App() {
  const [screen, setScreen] = useState('today');
  const [key, setKey] = useState(0);
  const nav = (s) => { setScreen(s); setKey(k => k+1); };
  const Screen = SCREENS[screen] || TodayScreen;

  return (
    <div style={{height:'100vh', display:'flex', overflow:'hidden', background:T.bg, fontFamily:T.ui, color:T.ink}}>
      <Sidebar screen={screen} onNav={nav} />
      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        <Screen key={key} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
